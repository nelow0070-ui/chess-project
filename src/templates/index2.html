<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Chess Analyzer</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
  
  <style>
    body { background-color: #262421; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .main-container { max-width: 1100px; margin: 40px auto; }
    
    /* 체스보드 스타일 */
    #board { width: 500px; border: 5px solid #312e2b; border-radius: 4px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    
    /* 우측 패널 (기보 및 분석) */
    .analysis-panel {
      background-color: #2b2926;
      border-radius: 8px;
      height: 500px;
      display: flex;
      flex-direction: column;
    }
    .pgn-window {
      flex-grow: 1;
      overflow-y: auto;
      padding: 15px;
      background: #211f1c;
      font-family: monospace;
      font-size: 0.95rem;
      border-bottom: 1px solid #3d3a37;
    }
    .status-bar { padding: 15px; background: #312e2b; font-weight: bold; color: #999; }
    .highlight-white { color: #fff; font-weight: bold; }
    .highlight-black { color: #aaa; }

    /* 버튼 스타일 */
    .btn-custom { background-color: #81b64c; color: white; border: none; font-weight: bold; }
    .btn-custom:hover { background-color: #a3d16a; }
    .controls { display: flex; gap: 10px; margin-top: 20px; justify-content: center; }
  </style>
</head>
<body>

<div class="container main-container">
  <div class="row">
    <div class="col-lg-7 text-center">
      <div id="board"></div>
      <div class="controls">
        <button class="btn btn-secondary" id="btnStart">처음으로</button>
        <button class="btn btn-secondary" id="btnUndo">한 수 무르기</button>
        <button class="btn btn-custom" id="btnAnalyze">분석하기</button>
      </div>
    </div>

    <div class="col-lg-5">
      <div class="analysis-panel">
        <div class="status-bar" id="status">White to move</div>
        <div class="pgn-window" id="pgn-display">
          <div class="text-muted">경기를 시작하거나 PGN을 입력하세요...</div>
        </div>
        <div class="p-3">
          <label class="form-label small">FEN (현재 보드 상황):</label>
          <input type="text" class="form-control form-control-sm bg-dark text-light border-secondary" id="fen-input" readonly>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.12.0/chess.min.js"></script>
<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

<script>
  const game = new Chess();
  const boardEl = $('#board');
  const statusEl = $('#status');
  const pgnEl = $('#pgn-display');
  const fenInput = $('#fen-input');
  function loadSuggestions() {
    const fen = game.fen();

    fetch(`/moves?fen=${encodeURIComponent(fen)}`)
    .then(r=>r.json())
    .then(data=>{
      const box = document.getElementById("suggestions");
      box.innerHTML = "";

      if (data.length === 0) {
        box.innerHTML = "데이터 없음";
        return;
      }

      data.forEach(m=>{
        const div = document.createElement("div");

        let cls = "move-item ";
        if (m.type === "best") cls += "move-best";
        else if (m.type === "inaccuracy") cls += "move-inaccuracy";
        else if (m.type === "mistake") cls += "move-mistake";
        else if (m.type === "blunder") cls += "move-blunder";

        div.className = cls;

        // ⭐ 횟수 표시 추가
        div.innerText = `${m.san} (${m.count}회)`;

        div.onclick = ()=>{
          game.move(m.uci);
          update();
        };

        box.appendChild(div);
      });
    });
  }
  function updateStatus() {
    let status = '';
    let moveColor = game.turn() === 'b' ? 'Black' : 'White';

    if (game.in_checkmate()) status = `Game over, ${moveColor} is in checkmate.`;
    else if (game.in_draw()) status = 'Game over, drawn position';
    else {
      status = moveColor + ' to move';
      if (game.in_check()) status += ', ' + moveColor + ' is in check';
    }

    statusEl.html(status);
    pgnEl.html(game.pgn({ max_width: 5, newline_char: '<br>' }));
    fenInput.val(game.fen());
  }

  const config = {
    draggable: true,
    position: 'start',
    pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
    onDragStart: (source, piece) => {
      if (game.game_over()) return false;
      if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
          (game.turn() === 'b' && piece.search(/^w/) !== -1)) return false;
    },
    onDrop: (source, target) => {
      let move = game.move({ from: source, to: target, promotion: 'q' });
      if (move === null) return 'snapback';
      updateStatus();
    },
    onSnapEnd: () => board.position(game.fen())
  };

  const board = Chessboard('board', config);

  $('#btnStart').on('click', () => { game.reset(); board.start(); updateStatus(); });
  $('#btnUndo').on('click', () => { game.undo(); board.position(game.fen()); updateStatus(); });
</script>

</body>
</html>
