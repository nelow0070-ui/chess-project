<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Chess Analyzer</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">

  <style>
    :root {
      --burgundy: #6f1d2f;
      --burgundy-dark: #42111d;
      --burgundy-soft: #8f2f45;
      --cream: #fffaf6;
      --paper: #ffffff;
      --ink: #25151a;
      --muted: #7a6870;
      --line: #eadde1;
      --gold: #c59a4b;
      --green: #557c55;
      --danger: #b84a4a;
      --shadow: 0 18px 45px rgba(66, 17, 29, 0.18);
    }

    body {
      min-height: 100vh;
      margin: 0;
      background:
        radial-gradient(circle at top left, rgba(197,154,75,0.18), transparent 34%),
        linear-gradient(135deg, #fffaf6 0%, #f7eef1 50%, #ffffff 100%);
      color: var(--ink);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .app-shell {
      width: min(1180px, calc(100vw - 32px));
      margin: 28px auto;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 18px;
    }

    .topbar-left {
      position: relative;
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }

    .settings-button {
      width: 42px;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--burgundy);
      font-size: 1.1rem;
      font-weight: 900;
      line-height: 1;
      box-shadow: 0 10px 26px rgba(66, 17, 29, 0.08);
    }

    .settings-panel {
      position: absolute;
      z-index: 20;
      left: 0;
      top: 52px;
      width: 260px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      box-shadow: var(--shadow);
    }

    .settings-panel.hidden {
      display: none;
    }

    .settings-title {
      margin: 0 0 12px;
      color: var(--burgundy-dark);
      font-size: 1rem;
      font-weight: 800;
    }

    .settings-row {
      margin-top: 12px;
    }

    .settings-help {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 0.78rem;
      line-height: 1.45;
    }

    .segmented-control {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      padding: 4px;
      border-radius: 8px;
      background: #f7eef1;
    }

    .segmented-control button {
      min-height: 36px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--burgundy);
      font-weight: 800;
    }

    .segmented-control button.active {
      background: var(--burgundy);
      color: #fff;
    }

    .settings-button:hover {
      background: #fff6f8;
    }

    .brand-title {
      margin: 0;
      color: var(--burgundy-dark);
      font-size: clamp(1.55rem, 3vw, 2.35rem);
      font-weight: 800;
      letter-spacing: 0;
    }

    .brand-subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .view-toggle {
      display: inline-flex;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
      box-shadow: 0 10px 26px rgba(66, 17, 29, 0.08);
    }

    .view-toggle button,
    .tab-button,
    .control-button {
      border: 0;
      border-radius: 6px;
      font-weight: 700;
      line-height: 1;
      transition: background 150ms ease, color 150ms ease, transform 150ms ease;
    }

    .view-toggle button {
      min-width: 56px;
      padding: 10px 14px;
      background: transparent;
      color: var(--burgundy);
    }

    .view-toggle button.active {
      background: var(--burgundy);
      color: #fff;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(420px, 1.25fr) minmax(320px, 0.85fr);
      gap: 22px;
      align-items: start;
    }

    .board-section,
    .analysis-panel {
      background: rgba(255,255,255,0.88);
      border: 1px solid rgba(234, 221, 225, 0.95);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .board-section {
      padding: 18px;
    }

    .board-stage {
      display: flex;
      justify-content: center;
      align-items: stretch;
      gap: 12px;
    }

    .eval-bar {
      position: relative;
      width: 38px;
      height: 520px;
      overflow: hidden;
      background: var(--burgundy-dark);
      border: 1px solid var(--burgundy-dark);
      border-radius: 6px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
    }

    .eval-fill {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 50%;
      background: var(--paper);
      transition: height 180ms ease;
    }

    .eval-midline {
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      height: 1px;
      background: var(--gold);
    }

    .eval-label {
      position: absolute;
      left: 50%;
      bottom: 9px;
      transform: translateX(-50%);
      min-width: 30px;
      padding: 4px 5px;
      background: var(--burgundy);
      border-radius: 4px;
      color: #fff;
      font-size: 0.72rem;
      font-weight: 800;
      line-height: 1;
      text-align: center;
      white-space: nowrap;
    }

    .eval-label.black-advantage {
      top: 9px;
      bottom: auto;
      background: #fff;
      color: var(--burgundy-dark);
      border: 1px solid rgba(66, 17, 29, 0.18);
    }

    #board {
      width: 520px;
      border: 4px solid var(--burgundy-dark);
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 20px 42px rgba(66, 17, 29, 0.22);
    }

    #board .square-55d63 {
      cursor: pointer;
    }

    #board .selected-square {
      box-shadow: inset 0 0 0 4px var(--gold);
    }

    #board .legal-square::after {
      content: '';
      position: absolute;
      left: 50%;
      top: 50%;
      width: 28%;
      height: 28%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: rgba(111, 29, 47, 0.34);
      pointer-events: none;
    }

    #board .capture-square {
      box-shadow: inset 0 0 0 4px rgba(184, 74, 74, 0.72);
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-top: 16px;
    }

    .control-button {
      min-height: 40px;
      padding: 0 16px;
      background: #fff;
      border: 1px solid var(--line);
      color: var(--burgundy);
      box-shadow: 0 8px 18px rgba(66, 17, 29, 0.08);
    }

    .control-button.primary {
      background: var(--burgundy);
      border-color: var(--burgundy);
      color: #fff;
    }

    .control-button:hover,
    .tab-button:hover,
    .view-toggle button:hover {
      transform: translateY(-1px);
    }

    .analysis-panel {
      min-height: 612px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .status-card {
      padding: 18px 20px;
      background: linear-gradient(135deg, var(--burgundy) 0%, var(--burgundy-dark) 100%);
      color: #fff;
    }

    .status-label {
      margin: 0 0 6px;
      color: rgba(255,255,255,0.78);
      font-size: 0.78rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .status-text {
      margin: 0;
      font-size: 1.25rem;
      font-weight: 800;
    }

    .tabs {
      display: flex;
      gap: 8px;
      padding: 14px 14px 0;
      background: var(--paper);
    }

    .tab-button {
      flex: 1;
      min-height: 40px;
      background: #f7eef1;
      color: var(--burgundy);
    }

    .tab-button.active {
      background: var(--burgundy);
      color: #fff;
    }

    .tab-panel {
      display: none;
      flex: 1;
      padding: 16px;
      background: var(--paper);
    }

    .tab-panel.active {
      display: flex;
      flex-direction: column;
    }

    .pgn-window {
      flex: 1;
      min-height: 270px;
      overflow-y: auto;
      padding: 15px;
      background: var(--cream);
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--ink);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.95rem;
      line-height: 1.65;
    }

    .fen-block {
      margin-top: 14px;
    }

    .field-label {
      display: block;
      margin-bottom: 7px;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .fen-input {
      width: 100%;
      min-height: 38px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      font-size: 0.82rem;
    }

    .suggestions-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 330px;
      max-height: 430px;
      overflow-y: auto;
    }

    .move-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px 14px;
      align-items: center;
      padding: 13px 14px;
      border: 1px solid var(--line);
      border-left: 5px solid var(--burgundy);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      cursor: pointer;
      text-align: left;
    }

    .move-item:hover {
      background: #fff6f8;
    }

    .move-san {
      font-size: 1.05rem;
      font-weight: 800;
      color: var(--burgundy-dark);
    }

    .move-meta {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
    }

    .move-record {
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 700;
    }

    .move-type {
      justify-self: end;
      padding: 5px 8px;
      border-radius: 999px;
      background: #f7eef1;
      color: var(--burgundy);
      font-size: 0.72rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    .move-item.best { border-left-color: var(--green); }
    .move-item.best .move-type { background: #eef5ee; color: var(--green); }
    .move-item.inaccuracy { border-left-color: var(--gold); }
    .move-item.inaccuracy .move-type { background: #fbf2df; color: #8a6626; }
    .move-item.mistake,
    .move-item.blunder { border-left-color: var(--danger); }
    .move-item.mistake .move-type,
    .move-item.blunder .move-type { background: #f9eaea; color: var(--danger); }

    .empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 220px;
      border: 1px dashed var(--line);
      border-radius: 6px;
      color: var(--muted);
      background: var(--cream);
      font-weight: 700;
      text-align: center;
    }

    @media (max-width: 992px) {
      .workspace { grid-template-columns: 1fr; }
      .analysis-panel { min-height: 520px; }
    }

    @media (max-width: 640px) {
      .app-shell { width: min(100vw - 20px, 1180px); margin: 16px auto; }
      .topbar { align-items: stretch; flex-direction: column; }
      .topbar-left { align-items: flex-start; }
      .settings-panel { width: min(260px, calc(100vw - 32px)); }
      .view-toggle { align-self: flex-start; }
      .board-section { padding: 12px; }
      .board-stage { gap: 8px; }
      #board { width: min(80vw, 520px); }
      .eval-bar { width: 32px; height: min(80vw, 520px); }
      .controls { justify-content: stretch; }
      .control-button { flex: 1 1 120px; }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div class="topbar-left">
        <button class="settings-button" id="settingsToggle" type="button" aria-label="설정">⚙</button>
        <div class="settings-panel hidden" id="settingsPanel">
          <p class="settings-title">설정</p>
          <div class="settings-row">
            <label class="field-label">내 색</label>
            <div class="segmented-control" aria-label="내 색 선택">
              <button type="button" class="active" id="myColorWhite">백</button>
              <button type="button" id="myColorBlack">흑</button>
            </div>
            <p class="settings-help">현재 차례가 내 색과 다르면 상대가 둔 수로 표시합니다.</p>
          </div>
        </div>
        <div>
          <h1 class="brand-title">AI Chess Analyzer</h1>
          <p class="brand-subtitle">현재 포지션의 평가와 내 게임 데이터 기반 후보 수를 함께 확인합니다.</p>
        </div>
      </div>
      <div class="view-toggle" aria-label="보드 방향 선택">
        <button type="button" class="active" id="viewWhite">백</button>
        <button type="button" id="viewBlack">흑</button>
      </div>
    </header>

    <section class="workspace">
      <div class="board-section">
        <div class="board-stage">
          <div class="eval-bar" aria-label="현재 평가치">
            <div class="eval-fill" id="eval-fill"></div>
            <div class="eval-midline"></div>
            <div class="eval-label" id="eval-label">0.0</div>
          </div>
          <div id="board"></div>
        </div>

        <div class="controls">
          <button class="control-button" id="btnStart" type="button">처음으로</button>
          <button class="control-button" id="btnUndo" type="button">한 수 무르기</button>
          <button class="control-button primary" id="btnAnalyze" type="button">분석하기</button>
        </div>
      </div>

      <aside class="analysis-panel">
        <div class="status-card">
          <p class="status-label">현재 상태</p>
          <p class="status-text" id="status">White to move</p>
        </div>

        <div class="tabs" role="tablist" aria-label="분석 패널">
          <button class="tab-button active" id="tabMoves" type="button" data-tab="moves">현재수순</button>
          <button class="tab-button" id="tabSuggestions" type="button" data-tab="suggestions">내가 둔 수</button>
        </div>

        <section class="tab-panel active" id="panelMoves" role="tabpanel" aria-labelledby="tabMoves">
          <div class="pgn-window" id="pgn-display">
            <div class="empty-state">아직 진행된 수가 없습니다.</div>
          </div>
          <div class="fen-block">
            <label class="field-label" for="fen-input">FEN</label>
            <input type="text" class="fen-input" id="fen-input" readonly>
          </div>
        </section>

        <section class="tab-panel" id="panelSuggestions" role="tabpanel" aria-labelledby="tabSuggestions">
          <div class="suggestions-list" id="suggestions">
            <div class="empty-state">포지션을 분석하면 내가 둔 수가 표시됩니다.</div>
          </div>
        </section>
      </aside>
    </section>
  </main>

  <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.12.0/chess.min.js"></script>
  <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

  <script>
    const game = new Chess();
    const statusEl = $('#status');
    const pgnEl = $('#pgn-display');
    const fenInput = $('#fen-input');
    const evalFill = document.getElementById('eval-fill');
    const evalLabel = document.getElementById('eval-label');
    const suggestionsEl = document.getElementById('suggestions');
    const viewWhiteBtn = document.getElementById('viewWhite');
    const viewBlackBtn = document.getElementById('viewBlack');
    const settingsToggle = document.getElementById('settingsToggle');
    const settingsPanel = document.getElementById('settingsPanel');
    const myColorWhiteBtn = document.getElementById('myColorWhite');
    const myColorBlackBtn = document.getElementById('myColorBlack');
    const tabSuggestionsBtn = document.getElementById('tabSuggestions');

    let board;
    let boardOrientation = 'white';
    let myColor = 'white';
    let selectedSquare = null;
    let evalRequestId = 0;
    let suggestionsRequestId = 0;
    let lastSuggestions = [];

    function squareEl(square) {
      return $('#board .square-' + square);
    }

    function clearHighlights() {
      $('#board .square-55d63').removeClass('selected-square legal-square capture-square');
    }

    function legalMovesFrom(square) {
      return game.moves({ square, verbose: true });
    }

    function selectSquare(square) {
      const moves = legalMovesFrom(square);
      clearHighlights();

      if (moves.length === 0) {
        selectedSquare = null;
        return;
      }

      selectedSquare = square;
      squareEl(square).addClass('selected-square');

      moves.forEach(move => {
        squareEl(move.to).addClass(move.captured ? 'capture-square' : 'legal-square');
      });
    }

    function moveFromSelected(targetSquare) {
      if (!selectedSquare) return false;

      const move = game.move({
        from: selectedSquare,
        to: targetSquare,
        promotion: 'q'
      });

      if (!move) return false;

      selectedSquare = null;
      clearHighlights();
      board.position(game.fen());
      updateStatus();
      return true;
    }

    function boardSquareFromEvent(event) {
      const square = $(event.target).closest('.square-55d63').attr('data-square');
      if (square) return square;

      const className = $(event.target).closest('.square-55d63').attr('class') || '';
      const match = className.match(/square-([a-h][1-8])/);
      return match ? match[1] : null;
    }

    function onBoardClick(event) {
      const square = boardSquareFromEvent(event);
      if (!square || game.game_over()) return;

      if (selectedSquare && moveFromSelected(square)) return;

      const piece = game.get(square);
      if (piece && piece.color === game.turn()) {
        selectSquare(square);
        return;
      }

      selectedSquare = null;
      clearHighlights();
    }

    function sideToMoveName() {
      return game.turn() === 'w' ? '백' : '흑';
    }

    function isMyTurn() {
      return (myColor === 'white' && game.turn() === 'w') || (myColor === 'black' && game.turn() === 'b');
    }

    function currentSuggestionLabel() {
      return isMyTurn() ? '내가 둔 수' : '상대가 둔 수';
    }

    function updateSuggestionContext() {
      tabSuggestionsBtn.textContent = currentSuggestionLabel();
    }

    function setMyColor(color) {
      myColor = color;
      myColorWhiteBtn.classList.toggle('active', color === 'white');
      myColorBlackBtn.classList.toggle('active', color === 'black');
      updateSuggestionContext();
      loadSuggestions();
    }

    function switchTab(tabName) {
      $('.tab-button').removeClass('active');
      $(`.tab-button[data-tab="${tabName}"]`).addClass('active');

      $('.tab-panel').removeClass('active');
      if (tabName === 'moves') {
        $('#panelMoves').addClass('active');
      } else if (tabName === 'suggestions') {
        $('#panelSuggestions').addClass('active');
      }
    }

    function setOrientation(orientation) {
      boardOrientation = orientation;
      board.orientation(orientation);
      selectedSquare = null;
      clearHighlights();
      viewWhiteBtn.classList.toggle('active', orientation === 'white');
      viewBlackBtn.classList.toggle('active', orientation === 'black');
    }

    function applySuggestionMove(uci) {
      const move = game.move({
        from: uci.slice(0, 2),
        to: uci.slice(2, 4),
        promotion: uci.slice(4, 5) || 'q'
      });

      if (!move) return;

      selectedSquare = null;
      clearHighlights();
      board.position(game.fen());
      updateStatus();
      switchTab('moves');
    }

    function formatWinrate(move) {
      if (move.winrate === null || move.winrate === undefined) return '승률 --';
      return `승률 ${move.winrate.toFixed(1)}%`;
    }

    function renderSuggestions(data) {
      lastSuggestions = data || [];
      suggestionsEl.innerHTML = '';
      updateSuggestionContext();

      if (lastSuggestions.length === 0) {
        suggestionsEl.innerHTML = `<div class="empty-state">이 포지션에서 ${currentSuggestionLabel()}가 없습니다.</div>`;
        return;
      }

      lastSuggestions.forEach(move => {
        const item = document.createElement('button');
        item.type = 'button';
        item.className = `move-item ${move.type || 'unknown'}`;
        item.innerHTML = `
          <span class="move-san">${move.san}</span>
          <span class="move-type">${move.type || 'unknown'}</span>
          <span class="move-meta">${move.count}회 등장 · ${formatWinrate(move)}</span>
          <span class="move-record">${move.wins}승 ${move.draws}무 ${move.losses}패 · ${sideToMoveName()} 기준</span>
        `;
        item.addEventListener('click', () => applySuggestionMove(move.uci));
        suggestionsEl.appendChild(item);
      });
    }

    function currentPerspective() {
      return isMyTurn() ? 'player' : 'opponent';
    }

    function loadSuggestions() {
      const requestId = ++suggestionsRequestId;
      const fen = game.fen();
      const perspective = currentPerspective();

      fetch(`/moves?fen=${encodeURIComponent(fen)}&perspective=${perspective}`)
        .then(response => response.json())
        .then(data => {
          if (requestId !== suggestionsRequestId) return;
          renderSuggestions(data);
        })
        .catch(() => {
          if (requestId !== suggestionsRequestId) return;
          suggestionsEl.innerHTML = '<div class="empty-state">추천 수를 불러오지 못했습니다.</div>';
        });
    }

    function formatEval(data) {
      if (data.type === 'mate') {
        if (data.mate === 0) return 'M0';
        return data.mate > 0 ? `M${data.mate}` : `-M${Math.abs(data.mate)}`;
      }

      const pawns = data.cp / 100;
      return pawns > 0 ? `+${pawns.toFixed(1)}` : pawns.toFixed(1);
    }

    function evalToWhitePercent(data) {
      if (data.type === 'mate') {
        return data.mate > 0 ? 100 : 0;
      }

      const capped = Math.max(-800, Math.min(800, data.cp));
      return 50 + (capped / 16);
    }

    function renderEvaluation(data) {
      const whitePercent = evalToWhitePercent(data);
      evalFill.style.height = `${whitePercent}%`;
      evalLabel.innerText = formatEval(data);
      evalLabel.classList.toggle('black-advantage', whitePercent < 50);
    }

    function loadEvaluation() {
      const requestId = ++evalRequestId;
      const fen = game.fen();

      fetch(`/eval?fen=${encodeURIComponent(fen)}`)
        .then(response => response.json())
        .then(data => {
          if (requestId !== evalRequestId) return;

          if (data.error) {
            evalLabel.innerText = '--';
            evalFill.style.height = '50%';
            evalLabel.classList.remove('black-advantage');
            return;
          }

          renderEvaluation(data);
        })
        .catch(() => {
          if (requestId !== evalRequestId) return;
          evalLabel.innerText = '--';
          evalFill.style.height = '50%';
          evalLabel.classList.remove('black-advantage');
        });
    }

    function updateStatus() {
      let status = '';
      const moveColor = game.turn() === 'b' ? 'Black' : 'White';

      if (game.in_checkmate()) status = `Game over, ${moveColor} is in checkmate.`;
      else if (game.in_draw()) status = 'Game over, drawn position';
      else {
        status = moveColor + ' to move';
        if (game.in_check()) status += ', ' + moveColor + ' is in check';
      }

      const pgn = game.pgn({ max_width: 56, newline_char: '<br>' });
      statusEl.text(status);
      pgnEl.html(pgn || '<div class="empty-state">아직 진행된 수가 없습니다.</div>');
      fenInput.val(game.fen());
      updateSuggestionContext();

      loadSuggestions();
      loadEvaluation();
    }

    const config = {
      draggable: false,
      position: 'start',
      pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
    };

    board = Chessboard('board', config);

    $('#board').on('click', '.square-55d63', onBoardClick);
    $('#btnStart').on('click', () => {
      game.reset();
      selectedSquare = null;
      clearHighlights();
      board.start();
      setOrientation(boardOrientation);
      updateStatus();
    });
    $('#btnUndo').on('click', () => {
      game.undo();
      selectedSquare = null;
      clearHighlights();
      board.position(game.fen());
      updateStatus();
    });
    $('#btnAnalyze').on('click', () => {
      loadSuggestions();
      loadEvaluation();
      switchTab('suggestions');
    });
    $('.tab-button').on('click', function() {
      switchTab(this.dataset.tab);
    });
    $('#viewWhite').on('click', () => setOrientation('white'));
    $('#viewBlack').on('click', () => setOrientation('black'));
    $('#settingsToggle').on('click', () => settingsPanel.classList.toggle('hidden'));
    $('#myColorWhite').on('click', () => setMyColor('white'));
    $('#myColorBlack').on('click', () => setMyColor('black'));
    $(document).on('click', event => {
      if (!settingsPanel.contains(event.target) && event.target !== settingsToggle) {
        settingsPanel.classList.add('hidden');
      }
    });

    updateStatus();
  </script>
</body>
</html>
